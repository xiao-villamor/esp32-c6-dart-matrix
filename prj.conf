# ═══════════════════════════════════════════════════════════════════════════
# Smart Dartboard — Zephyr Project Configuration
# Target: ESP32-C6-DevKitC-1 (N4)
# Mode: BLE (GranBoard-compatible peripheral)
# ═══════════════════════════════════════════════════════════════════════════

# --- Core ---
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=196608
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# --- GPIO ---
CONFIG_GPIO=y

# --- Console / Logging ---
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# --- Bluetooth Low Energy ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="GranBoard"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# BLE buffer tuning — ensure notifications don't stall the controller.
# Default ACL TX count is 3; bumping to 7 gives headroom for the
# separator + hit pair without back-pressure blocking the system workqueue.
CONFIG_BT_BUF_ACL_TX_COUNT=7
CONFIG_BT_L2CAP_TX_BUF_COUNT=7

# --- Threads ---
CONFIG_THREAD_NAME=y
